tests:
  - name: BD111 Casino Home Page
    type: api
    request:
      method: GET
      url: http://localhost:8000/index.html
    assertions:
      - type: statusCode
        operator: is
        target: 200
      - type: body
        operator: contains
        target: "BD111 REAL CASINO"

  - name: BD111 Casino Dashboard Page
    type: api
    request:
      method: GET
      url: http://localhost:8000/dashboard.html
    assertions:
      - type: statusCode
        operator: is
        target: 200
      - type: body
        operator: contains
        target: "User Dashboard"

  - name: BD111 Casino Slot Page
